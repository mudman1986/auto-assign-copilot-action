name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  workflow_dispatch:

jobs:
  validate-pr:
    name: Validate Pull Request
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run release helper tests
        run: npm test -- src/release.test.js

      - name: Verify workflow syntax
        run: |
          echo "Checking release workflow..."
          if [ ! -f ".github/workflows/release.yml" ]; then
            echo "::error::.github/workflows/release.yml not found"
            exit 1
          fi
          if ! grep -q "generate_release_notes" .github/workflows/release.yml; then
            echo "::error::release.yml does not enable GitHub-generated release notes"
            exit 1
          fi
          echo "✅ Release workflow looks correct"

      - name: Check release documentation
        run: |
          if [ ! -f "RELEASE.md" ]; then
            echo "::error::RELEASE.md documentation not found"
            exit 1
          fi
          echo "✅ Release documentation exists"
