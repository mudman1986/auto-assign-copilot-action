name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release-type:
        description: Release bump to apply when running manually
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate release helpers
        run: npm test -- src/release.test.js

      - name: Build action
        run: npm run build

      - name: Fail if dist is out of date
        run: |
          if [ -n "$(git status --porcelain dist/)" ]; then
            echo "::error::Uncommitted changes in dist/ directory. Please run 'npm run build' and commit the changes."
            git diff dist/
            exit 1
          fi

      - name: Resolve release metadata
        id: release
        uses: actions/github-script@v8
        env:
          INPUT_RELEASE_TYPE: ${{ inputs.release-type || '' }}
        with:
          script: |
            const core = require('@actions/core')
            const { execSync } = require('node:child_process')
            const path = require('node:path')
            const { determineReleaseType, bumpVersion } = require(path.join(process.env.GITHUB_WORKSPACE, 'src/release.js'))

            const owner = context.repo.owner
            const repo = context.repo.repo
            const manualReleaseType = (process.env.INPUT_RELEASE_TYPE || '').trim()
            const latestTag = execSync("git tag --list 'v*' --sort=-v:refname | head -1", { encoding: 'utf8' }).trim()
            const currentVersion = (latestTag || 'v0.0.0').replace(/^v/i, '')

            let releaseType = manualReleaseType || 'patch'
            let sourcePr = null

            if (context.eventName === 'push') {
              const { data: pullRequests } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner,
                repo,
                commit_sha: context.sha
              })

              sourcePr = pullRequests.find(pullRequest => pullRequest.merged_at) || null

              if (sourcePr) {
                releaseType = determineReleaseType(sourcePr.labels || [])
              }
            }

            const nextVersion = bumpVersion(currentVersion, releaseType)
            const tag = `v${nextVersion}`
            let alreadyReleased = false

            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag })
              alreadyReleased = true
            } catch (error) {
              if (error.status !== 404) {
                throw error
              }
            }

            core.setOutput('already_released', alreadyReleased ? 'true' : 'false')
            core.setOutput('current_version', currentVersion)
            core.setOutput('release_type', releaseType)
            core.setOutput('tag', tag)
            core.setOutput('major_tag', `v${nextVersion.split('.')[0]}`)
            core.setOutput('target_commitish', context.sha)
            core.setOutput('pr_number', sourcePr ? String(sourcePr.number) : '')

      - name: Create GitHub release
        if: steps.release.outputs.already_released != 'true'
        uses: actions/github-script@v8
        env:
          TAG: ${{ steps.release.outputs.tag }}
          TARGET_COMMITISH: ${{ steps.release.outputs.target_commitish }}
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.TAG,
              target_commitish: process.env.TARGET_COMMITISH,
              name: process.env.TAG,
              generate_release_notes: true
            })

      - name: Update moving major tag
        if: steps.release.outputs.already_released != 'true'
        uses: actions/github-script@v8
        env:
          MAJOR_TAG: ${{ steps.release.outputs.major_tag }}
          TARGET_COMMITISH: ${{ steps.release.outputs.target_commitish }}
        with:
          script: |
            const owner = context.repo.owner
            const repo = context.repo.repo
            const ref = `tags/${process.env.MAJOR_TAG}`
            const sha = process.env.TARGET_COMMITISH

            try {
              await github.rest.git.updateRef({
                owner,
                repo,
                ref,
                sha,
                force: true
              })
            } catch (error) {
              if (error.status !== 404) {
                throw error
              }

              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/${ref}`,
                sha
              })
            }

      - name: Cleanup old releases
        if: steps.release.outputs.already_released != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DRY_RUN: 'false'
        run: npm run cleanup-releases

      - name: Report skipped release
        if: steps.release.outputs.already_released == 'true'
        run: echo "Release ${{ steps.release.outputs.tag }} already exists. Nothing to do."
